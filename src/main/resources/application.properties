openweather.apikey=${OPENWEATHER_APIKEY}
openwather.endpoint=https://api.openweathermap.org/data/2.5/weather

spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


kikhabo.security.jwt-secret=${JWT_SECRET}
kikhabo.security.jwt-expire-in-days=365

snapadmin.enabled=true
snapadmin.baseUrl=admin
snapadmin.modelsPackage=com.iishanto.kikhabo.infrastructure.model

logging.level.root=INFO

# AWS S3
aws.s3.bucket-name=${S3_AWS_BUCKET}
aws.s3.region=${S3_AWS_REGION}
aws.s3.access-key=${S3_ACCESS_KEY}
aws.s3.secret-key=${S3_SECRET_ACCESS_TOKEN}

# Multipart upload limit (10 MB to accommodate vision uploads before compression)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# -------------------------------------------------------------------
# Gemini Vision API (ingredient detection)
# Uses a separate endpoint so you can target a cheaper/free-tier model
# independently of the meal-suggestion chatbot above.
#
# gemini-1.5-flash = free tier (60 req/min) — good for vision
# Swap for gemini-2.5-flash if you need higher accuracy later.
# -------------------------------------------------------------------
google.gemini.vision.endpoint=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# Optional dedicated API key for vision (e.g. a free-tier Google AI Studio key).
# Falls back to google.gemini.apikey above when this line is commented out.
 google.gemini.vision.apikey=${GEMINI_VISION_KEY}

# Image is resized to at most 1024 px (longest edge) then JPEG-compressed to ≤1 MB before sending
google.gemini.vision.max-image-size-bytes=1048576
google.gemini.vision.max-image-dimension=1024
# Only ingredients Gemini is ≥70% confident about are returned
google.gemini.vision.confidence-threshold=0.70